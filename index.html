<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matheus Teixeira | Senior Backend Engineer</title>
    <style>
        /* Variáveis de Tema Padrão */
        :root {
            --bg-body: #050505;
            --bg-sidebar: #0d1117;
            --bg-terminal: #0d1117;
            --text-main: #c9d1d9;
            --text-terminal: #00ff88;
            --text-prompt: #8b949e;
            --border-color: #30363d;
            --font-terminal: 'Courier New', Courier, monospace;
            --font-ui: system-ui, -apple-system, sans-serif;
            --accent: #00ff88;
        }

        /* Tema Dracula */
        .theme-dracula {
            --bg-terminal: #282a36;
            --text-terminal: #f8f8f2;
            --text-prompt: #ff79c6;
            --border-color: #6272a4;
        }

        /* Tema Ubuntu */
        .theme-ubuntu {
            --bg-terminal: #300a24;
            --text-terminal: #ffffff;
            --text-prompt: #8ae234;
            --border-color: #5e2750;
        }
        
        /* Tema Light */
        .theme-light {
            --bg-terminal: #ffffff;
            --text-terminal: #333333;
            --text-prompt: #005cc5;
            --border-color: #d0d7de;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: var(--font-ui);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Lado Esquerdo: Sidebar Aprimorada */
        .sidebar {
            width: 340px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            padding: 40px 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
            z-index: 10;
            overflow-y: auto;
        }

        .profile-pic {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--border-color);
            margin-bottom: 20px;
            background-color: #161b22; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            transition: transform 0.3s ease;
        }

        .profile-pic:hover {
            transform: scale(1.05);
            border-color: var(--accent);
        }

        .sidebar h1 {
            font-size: 1.6rem;
            margin: 0 0 5px 0;
            text-align: center;
            letter-spacing: -0.5px;
            color: #ffffff;
        }

        .sidebar h2 {
            font-size: 0.95rem;
            color: #8b949e;
            font-weight: 500;
            margin: 0 0 15px 0;
            text-align: center;
        }

        /* Indicador de Status */
        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background-color: rgba(39, 201, 63, 0.1);
            color: #27c93f;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 25px;
            border: 1px solid rgba(39, 201, 63, 0.2);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #27c93f;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(39, 201, 63, 0.7); }
            70% { box-shadow: 0 0 0 6px rgba(39, 201, 63, 0); }
            100% { box-shadow: 0 0 0 0 rgba(39, 201, 63, 0); }
        }

        /* Informações Rápidas */
        .quick-info {
            width: 100%;
            margin-bottom: 25px;
            font-size: 0.85rem;
            color: #8b949e;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .info-item svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        /* Tech Pills */
        .tech-stack {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-bottom: 30px;
            width: 100%;
        }

        .tech-pill {
            background-color: #161b22;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        /* Links Sociais */
        .social-links {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            margin-top: auto;
        }

        .social-links a {
            color: var(--text-main);
            text-decoration: none;
            padding: 10px 15px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .social-links a:hover {
            background-color: #161b22;
            border-color: #8b949e;
            transform: translateY(-2px);
        }

        .social-links svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        /* Lado Direito: Terminal */
        .main-content {
            flex-grow: 1;
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-body);
        }

        .terminal-window {
            width: 100%;
            max-width: 900px;
            height: 85vh;
            background-color: var(--bg-terminal);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: background-color 0.3s, border-color 0.3s;
        }

        .terminal-header {
            height: 30px;
            background-color: rgba(0,0,0,0.2);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            padding: 0 15px;
            gap: 8px;
        }

        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .dot.red { background-color: #ff5f56; }
        .dot.yellow { background-color: #ffbd2e; }
        .dot.green { background-color: #27c93f; }

        .terminal-body {
            padding: 20px;
            flex-grow: 1;
            overflow-y: auto;
            font-family: var(--font-terminal);
            color: var(--text-terminal);
            font-size: 15px;
            line-height: 1.6;
            scroll-behavior: smooth;
        }

        .output-line {
            margin-bottom: 5px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .input-line {
            display: flex;
            align-items: center;
            margin-top: 10px;
        }

        .prompt {
            margin-right: 10px;
            color: var(--text-prompt);
        }

        input {
            background: transparent;
            border: none;
            color: var(--text-terminal);
            font-family: var(--font-terminal);
            font-size: 15px;
            flex-grow: 1;
            outline: none;
        }
        
        .typing-cursor::after {
            content: '█';
            animation: blink 1s step-end infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }

        @media (max-width: 768px) {
            body { flex-direction: column; overflow: auto; }
            .sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--border-color); padding: 30px 20px; }
            .main-content { padding: 15px; height: 60vh; }
            .terminal-window { height: 100%; }
        }
    </style>
</head>

    <script>
        const outputDiv = document.getElementById('output');
        const commandInput = document.getElementById('commandInput');
        const terminalWindow = document.getElementById('terminalWindow');
        const outputContainer = document.getElementById('outputContainer');
        const mainPrompt = document.getElementById('mainPrompt');

        let currentLang = 'en';
        let commandHistory = [];
        let historyIndex = -1;
        let isTyping = false;
        
        // Estado de privilégio
        let isRoot = false;
        let isPasswordMode = false;
        let currentPromptText = "matheus@portfolio:~$";

        const availableCommands = [
            'whoami', 'skills', 'experience', 'education', 'contact',
            'download', 'theme', 'curl https://api.mathbteixeira.dev/v1/health',
            'coffee', 'clear', 'sudo su', 'exit', 'lang pt', 'lang en'
        ];

        const resumeData = {
            en: {
                welcome: "Last login: " + new Date().toDateString() + "\nType 'help' to see available commands.",
                help: "Available commands:\n  whoami      - View professional summary\n  skills      - View technical stack\n  experience  - View work history\n  education   - View academic background\n  download    - Download resume in PDF format\n  theme       - Change terminal theme (default, dracula, ubuntu, light)\n  curl        - Ping the backend API (Tip: type 'curl' and press TAB)\n  coffee      - Request caffeine\n  sudo su     - Elevate privileges\n  lang pt     - Switch to Portuguese\n  lang en     - Switch to English\n  clear       - Clear terminal",
                whoami: "Matheus Batista Teixeira\nSenior Backend Software Engineer with 9 years of experience in distributed systems and high-scale enterprise architectures.\nExpert in Java/Spring ecosystem, event-driven (Kafka), and microservices architecture.",
                skills: "Languages: Java, Python, SQL\nFrameworks: Spring Boot (Webflux, Data, Cloud, Batch), Quarkus, JUnit, MyBatis\nDatabases: PostgreSQL, MongoDB, Redis, Firebase, Oracle Database\nCloud/Devops: Docker, Google Cloud Platform (GCP), Splunk\nArchitecture: Apache Kafka, Microservices, REST APIs, GraphQL",
                experience: "[2023-Present] Senior Software Engineer @ Abercrombie & Fitch\n- Reduced inventory data retrieval latency by 99.9% by refactoring SQL queries.\n- Architected high-volume automated data processing pipelines using Spring Batch.\n\n[2022-2023] Senior Backend Software Engineer @ Ontop\n- Architected an asynchronous event-driven email system using Apache Kafka.\n- Designed an auditing microservice to track third-party API calls.\n\n[2020-2022] Backend Software Engineer @ GFT Group\n- Developed cloud-native REST APIs using Java and Quarkus for the oil industry.\n\n[2018-2020] Software Engineer @ Mastercard\n- Engineered fallback strategies and circuit breaker patterns for global payment infrastructure.",
                education: "MBA in Full Cycle Architecture - Full Cycle University (Graduation: Oct 2026)\nSystem Analysis and Development - Universidade Federal do Paraná (UFPR) (Graduated: Aug 2017)",
                downloading: "Initiating resume download (Matheus_Teixeira_Senior_Backend_Engineer.pdf)...",
                themeSuccess: "Theme updated to: ",
                curlStatus: "{\n  \"status\": \"200 OK\",\n  \"role\": \"Senior Backend Engineer\",\n  \"availability\": \"Open to new challenges\",\n  \"location\": \"Curitiba, Brazil (Remote)\",\n  \"core_stack\": [\"Java\", \"Spring Boot\", \"Kafka\", \"Microservices\"]\n}",
                curlHint: "curl: missing URL.\nHint: type 'curl' and press TAB to auto-complete.",
                coffeeMsg: "Generating caffeine for the next sprint...",
                invalid: "Command not found. Type 'help' for available commands.",
                langSwitch: "Language switched to English."
            },
            pt: {
                welcome: "Último login: " + new Date().toDateString() + "\nDigite 'help' para ver os comandos disponíveis.",
                help: "Comandos disponíveis:\n  whoami      - Ver resumo profissional\n  skills      - Ver stack tecnológica\n  experience  - Ver histórico profissional\n  education   - Ver formação acadêmica\n  download    - Baixar currículo em formato PDF\n  theme       - Mudar tema do terminal (default, dracula, ubuntu, light)\n  curl        - Ping na API de backend (Dica: digite 'curl' e pressione TAB)\n  coffee      - Solicitar cafeína\n  sudo su     - Elevar privilégios\n  lang pt     - Mudar para Português\n  lang en     - Mudar para Inglês\n  clear       - Limpar o terminal",
                whoami: "Matheus Batista Teixeira\nEngenheiro de Software Backend Sênior com 9 anos de experiência em sistemas distribuídos e arquiteturas corporativas de alta escala.\nEspecialista no ecossistema Java/Spring, arquitetura orientada a eventos (Kafka) e microsserviços.",
                skills: "Linguagens: Java, Python, SQL\nFrameworks: Spring Boot (Webflux, Data, Cloud, Batch), Quarkus, JUnit, MyBatis\nBancos de Dados: PostgreSQL, MongoDB, Redis, Firebase, Oracle Database\nCloud/Devops: Docker, Google Cloud Platform (GCP), Splunk\nArquitetura: Apache Kafka, Microsserviços, APIs REST, GraphQL",
                experience: "[2023-Presente] Engenheiro de Software Sênior @ Abercrombie & Fitch\n- Reduziu a latência de recuperação de dados de inventário em 99,9% refatorando consultas SQL.\n- Arquitetou pipelines automatizados de alto volume para processamento de dados usando Spring Batch.\n\n[2022-2023] Engenheiro de Software Backend Sênior @ Ontop\n- Arquitetou um sistema de email assíncrono orientado a eventos usando Apache Kafka.\n- Projetou um microsserviço de auditoria para rastrear chamadas de API de terceiros.\n\n[2020-2022] Engenheiro de Software Backend @ GFT Group\n- Desenvolveu APIs REST cloud-native usando Java e Quarkus para a indústria de petróleo.\n\n[2018-2020] Engenheiro de Software @ Mastercard\n- Desenvolveu estratégias de fallback e circuit breaker para infraestrutura de pagamentos globais.",
                education: "MBA em Full Cycle Architecture - Full Cycle University (Previsão: Out 2026)\nAnálise e Desenvolvimento de Sistemas - Universidade Federal do Paraná (UFPR) (Concluído: Ago 2017)",
                downloading: "Iniciando o download do currículo (Matheus_Teixeira_Senior_Backend_Engineer.pdf)...",
                themeSuccess: "Tema atualizado para: ",
                curlStatus: "{\n  \"status\": \"200 OK\",\n  \"cargo\": \"Senior Backend Engineer\",\n  \"disponibilidade\": \"Aberto a novos desafios\",\n  \"localizacao\": \"Curitiba, Brasil (Remoto)\",\n  \"stack_principal\": [\"Java\", \"Spring Boot\", \"Kafka\", \"Microsserviços\"]\n}",
                curlHint: "curl: URL ausente.\nDica: digite 'curl' e pressione TAB para autocompletar.",
                coffeeMsg: "Gerando cafeína para a próxima sprint...",
                invalid: "Comando não encontrado. Digite 'help' para comandos disponíveis.",
                langSwitch: "Idioma alterado para Português."
            }
        };

        const coffeeArt = `
      (  )   (   )  )
       ) (   )  (  (
       ( )  (    ) )
       _____________
      <_____________> ___
      |             |/ _ \\
      |               | | |
      |               |_| |
   ___|             |\\___/
  /    \\___________/    \\
  \\_____________________/
`;

        printEchoHTML(`<div class="output-line">${resumeData[currentLang].welcome}</div>`);

        commandInput.addEventListener('keydown', function (e) {
            if (isTyping) {
                e.preventDefault(); 
                return;
            }

            if (e.key === 'Tab' && !isPasswordMode) {
                e.preventDefault(); 
                const inputVal = this.value.trim().toLowerCase();
                
                if (inputVal === 'c' || inputVal === 'cu' || inputVal === 'cur' || inputVal === 'curl') {
                    this.value = 'curl https://api.mathbteixeira.dev/v1/health';
                } else if (inputVal.length > 0) {
                    const match = availableCommands.find(cmd => cmd.startsWith(inputVal));
                    if (match) {
                        this.value = match;
                    }
                }
                return;
            }

            if (e.key === 'Enter') {
                const cmd = this.value.trim();
                
                // Trata a entrada de senha para o sudo su
                if (isPasswordMode) {
                    this.value = '';
                    printEchoHTML(`<div class="output-line"> </div>`); // Ecoa vazio para simular Linux
                    
                    isPasswordMode = false;
                    commandInput.type = 'text';

                    if (cmd.toLowerCase() === 'backend' || cmd.toLowerCase() === 'root' || cmd.toLowerCase() === 'admin') {
                        isRoot = true;
                        currentPromptText = "root@portfolio:~#";
                        mainPrompt.innerHTML = currentPromptText;
                        mainPrompt.style.color = '#ff5f56'; 
                        typeResponse("Access granted. Root privileges escalated.\nType 'exit' to return to normal user.");
                    } else {
                        mainPrompt.innerHTML = currentPromptText;
                        mainPrompt.style.color = isRoot ? '#ff5f56' : 'var(--text-prompt)';
                        typeResponse("sudo: 1 incorrect password attempt");
                    }
                    return;
                }

                if (cmd) {
                    commandHistory.push(cmd); 
                    historyIndex = commandHistory.length;
                }
                
                this.value = '';
                processCommand(cmd.toLowerCase());
            } 
            else if (e.key === 'ArrowUp' && !isPasswordMode) {
                e.preventDefault();
                if (historyIndex > 0) {
                    historyIndex--;
                    this.value = commandHistory[historyIndex];
                }
            } 
            else if (e.key === 'ArrowDown' && !isPasswordMode) {
                e.preventDefault();
                if (historyIndex < commandHistory.length - 1) {
                    historyIndex++;
                    this.value = commandHistory[historyIndex];
                } else {
                    historyIndex = commandHistory.length;
                    this.value = '';
                }
            }
        });

        document.addEventListener('click', (e) => {
            if (e.target.closest('.terminal-body') && !isTyping) {
                commandInput.focus();
            }
        });

        function processCommand(cmd) {
            printEchoHTML(`<div class="output-line"><span class="prompt" style="color: ${isRoot ? '#ff5f56' : 'var(--text-prompt)'}">${currentPromptText}</span> ${cmd}</div>`);

            if (cmd === '') return;

            // Lógica do Easter Egg Sudo Su
            if (cmd === 'sudo su' || cmd === 'login') {
                if (isRoot) {
                    typeResponse("You are already root.");
                    return;
                }
                isPasswordMode = true;
                commandInput.type = 'password';
                mainPrompt.innerHTML = '[sudo] password for matheus: ';
                mainPrompt.style.color = '#c9d1d9';
                return;
            }

            if (cmd === 'exit') {
                if (isRoot) {
                    isRoot = false;
                    currentPromptText = "matheus@portfolio:~$";
                    mainPrompt.innerHTML = currentPromptText;
                    mainPrompt.style.color = 'var(--text-prompt)';
                    typeResponse("logout\nDropped root privileges.");
                } else {
                    typeResponse("Session closed. (Just kidding, you can't leave).");
                }
                return;
            }

            if (cmd === 'coffee') {
                typeResponse(coffeeArt + "\n" + resumeData[currentLang].coffeeMsg);
                return;
            }

            if (cmd.startsWith('curl')) {
                if (cmd === 'curl https://api.mathbteixeira.dev/v1/health' || cmd === 'curl api.mathbteixeira.dev/v1/health') {
                    typeResponse(resumeData[currentLang].curlStatus);
                } else {
                    typeResponse(resumeData[currentLang].curlHint);
                }
                return;
            }

            if (cmd.startsWith('theme')) {
                const parts = cmd.split(' ');
                if (parts.length > 1) {
                    const themeName = parts[1];
                    const validThemes = ['default', 'dracula', 'ubuntu', 'light'];
                    
                    if (validThemes.includes(themeName)) {
                        terminalWindow.className = 'terminal-window'; 
                        if (themeName !== 'default') {
                            terminalWindow.classList.add(`theme-${themeName}`);
                        }
                        typeResponse(resumeData[currentLang].themeSuccess + themeName);
                    } else {
                        typeResponse("Invalid theme. Available: default, dracula, ubuntu, light");
                    }
                } else {
                    typeResponse("Usage: theme <name>\nAvailable: default, dracula, ubuntu, light");
                }
                return;
            }

            switch (cmd) {
                case 'help': typeResponse(resumeData[currentLang].help); break;
                case 'whoami': typeResponse(resumeData[currentLang].whoami); break;
                case 'skills': typeResponse(resumeData[currentLang].skills); break;
                case 'experience': typeResponse(resumeData[currentLang].experience); break;
                case 'education': typeResponse(resumeData[currentLang].education); break;
                case 'download': 
                    typeResponse(resumeData[currentLang].downloading);
                    setTimeout(triggerDownload, 1000); 
                    break;
                case 'clear': outputDiv.innerHTML = ''; break;
                case 'lang pt': 
                    currentLang = 'pt'; 
                    typeResponse(resumeData[currentLang].langSwitch); 
                    break;
                case 'lang en': 
                    currentLang = 'en'; 
                    typeResponse(resumeData[currentLang].langSwitch); 
                    break;
                default: typeResponse(resumeData[currentLang].invalid);
            }
        }

        function printEchoHTML(html) {
            outputDiv.insertAdjacentHTML('beforeend', html);
            outputContainer.scrollTop = outputContainer.scrollHeight;
        }

        function typeResponse(text) {
            isTyping = true;
            commandInput.disabled = true;
            mainPrompt.style.display = 'none';

            const div = document.createElement('div');
            div.className = 'output-line typing-cursor'; 
            outputDiv.appendChild(div);

            let i = 0;
            const speed = 5; 
            const chunkSize = 3; 

            function type() {
                if (i < text.length) {
                    div.textContent += text.substring(i, i + chunkSize);
                    i += chunkSize;
                    outputContainer.scrollTop = outputContainer.scrollHeight;
                    setTimeout(type, speed);
                } else {
                    div.classList.remove('typing-cursor');
                    isTyping = false;
                    commandInput.disabled = false;
                    mainPrompt.style.display = 'inline';
                    commandInput.focus();
                }
            }
            type();
        }

        function triggerDownload() {
            const link = document.createElement('a');
            link.href = 'Matheus_Teixeira_Senior_Backend_Engineer.pdf'; 
            link.download = 'Matheus_Teixeira_Senior_Backend_Engineer.pdf';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
