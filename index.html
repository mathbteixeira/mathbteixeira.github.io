<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matheus Teixeira | Senior Backend Engineer</title>
    <style>
        /* Variáveis de Tema Padrão (Hacker/GitHub Dark) */
        :root {
            --bg-body: #050505;
            --bg-sidebar: #0d1117;
            --bg-terminal: #0d1117;
            --text-main: #c9d1d9;
            --text-terminal: #00ff88;
            --text-prompt: #8b949e;
            --border-color: #30363d;
            --font-terminal: 'Courier New', Courier, monospace;
            --font-ui: system-ui, -apple-system, sans-serif;
        }

        /* Tema Dracula */
        .theme-dracula {
            --bg-terminal: #282a36;
            --text-terminal: #f8f8f2;
            --text-prompt: #ff79c6;
            --border-color: #6272a4;
        }

        /* Tema Ubuntu */
        .theme-ubuntu {
            --bg-terminal: #300a24;
            --text-terminal: #ffffff;
            --text-prompt: #8ae234;
            --border-color: #5e2750;
        }
        
        /* Tema Light */
        .theme-light {
            --bg-terminal: #ffffff;
            --text-terminal: #333333;
            --text-prompt: #005cc5;
            --border-color: #d0d7de;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: var(--font-ui);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar (Lado Esquerdo) */
        .sidebar {
            width: 320px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
            z-index: 10;
        }

        .profile-pic {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--border-color);
            margin-bottom: 20px;
            /* Se a imagem não for encontrada, mostra um círculo com fallback */
            background-color: #161b22; 
        }

        .sidebar h1 {
            font-size: 1.5rem;
            margin: 0 0 5px 0;
            text-align: center;
        }

        .sidebar h2 {
            font-size: 1rem;
            color: #8b949e;
            font-weight: 400;
            margin: 0 0 30px 0;
            text-align: center;
        }

        .social-links {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
        }

        .social-links a {
            color: var(--text-main);
            text-decoration: none;
            padding: 10px 15px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            text-align: center;
            transition: all 0.2s;
            font-size: 0.9rem;
        }

        .social-links a:hover {
            background-color: #161b22;
            border-color: #8b949e;
        }

        /* Área Principal (Lado Direito) */
        .main-content {
            flex-grow: 1;
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-body);
        }

        /* Janela do Terminal */
        .terminal-window {
            width: 100%;
            max-width: 900px;
            height: 80vh;
            background-color: var(--bg-terminal);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: background-color 0.3s, border-color 0.3s;
        }

        .terminal-header {
            height: 30px;
            background-color: rgba(0,0,0,0.2);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            padding: 0 15px;
            gap: 8px;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        .dot.red { background-color: #ff5f56; }
        .dot.yellow { background-color: #ffbd2e; }
        .dot.green { background-color: #27c93f; }

        .terminal-body {
            padding: 20px;
            flex-grow: 1;
            overflow-y: auto;
            font-family: var(--font-terminal);
            color: var(--text-terminal);
            font-size: 15px;
            line-height: 1.6;
        }

        .output-line {
            margin-bottom: 5px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .input-line {
            display: flex;
            align-items: center;
            margin-top: 10px;
        }

        .prompt {
            margin-right: 10px;
            color: var(--text-prompt);
        }

        input[type="text"] {
            background: transparent;
            border: none;
            color: var(--text-terminal);
            font-family: var(--font-terminal);
            font-size: 15px;
            flex-grow: 1;
            outline: none;
        }

        /* Responsividade para celulares */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
                overflow: auto;
            }
            .sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid var(--border-color);
                padding: 20px;
            }
            .main-content {
                padding: 10px;
                height: 60vh;
            }
            .terminal-window {
                height: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <img src="profile.jpg" alt="Matheus Teixeira" class="profile-pic" onerror="this.style.display='none'">
        <h1>Matheus Teixeira</h1>
        <h2>Senior Backend Engineer</h2>
        
        <div class="social-links">
            <a href="https://linkedin.com/in/matheus-batista-teixeira" target="_blank">LinkedIn</a>
            <a href="https://github.com/mathbteixeira" target="_blank">GitHub</a>
            <a href="mailto:mbateixeira@yahoo.com.br">Email</a>
        </div>
    </div>

    <div class="main-content">
        <div class="terminal-window" id="terminalWindow">
            <div class="terminal-header">
                <span class="dot red"></span>
                <span class="dot yellow"></span>
                <span class="dot green"></span>
            </div>
            <div class="terminal-body" id="outputContainer">
                <div id="output"></div>
                <div class="input-line">
                    <span class="prompt">matheus@portfolio:~$</span>
                    <input type="text" id="commandInput" autocomplete="off" autofocus spellcheck="false">
                </div>
            </div>
        </div>
    </div>

    <script>
        const outputDiv = document.getElementById('output');
        const commandInput = document.getElementById('commandInput');
        const terminalWindow = document.getElementById('terminalWindow');
        const outputContainer = document.getElementById('outputContainer');

        let currentLang = 'en';
        
        // Histórico de comandos (Setas)
        let commandHistory = [];
        let historyIndex = -1;

        // Base de dados do currículo
        const resumeData = {
            en: {
                welcome: "Last login: " + new Date().toDateString() + "\nType 'help' to see available commands.",
                help: "Available commands:\n  whoami      - View professional summary\n  skills      - View technical stack\n  experience  - View work history\n  education   - View academic background\n  download    - Download resume in PDF format\n  theme       - Change terminal theme (default, dracula, ubuntu, light)\n  lang pt     - Switch to Portuguese\n  lang en     - Switch to English\n  clear       - Clear terminal",
                whoami: "Matheus Batista Teixeira\nSenior Backend Software Engineer with 9 years of experience in distributed systems and high-scale enterprise architectures.\nExpert in Java/Spring ecosystem, event-driven (Kafka), and microservices architecture.",
                skills: "Languages: Java, Python, SQL\nFrameworks: Spring Boot (Webflux, Data, Cloud, Batch), Quarkus, JUnit, MyBatis\nDatabases: PostgreSQL, MongoDB, Redis, Firebase, Oracle Database\nCloud/Devops: Docker, Google Cloud Platform (GCP), Splunk\nArchitecture: Apache Kafka, Microservices, REST APIs, GraphQL",
                experience: "[2023-Present] Senior Software Engineer @ Abercrombie & Fitch\n- Reduced inventory data retrieval latency by 99.9% by refactoring SQL queries.\n- Architected high-volume automated data processing pipelines using Spring Batch.\n\n[2022-2023] Senior Backend Software Engineer @ Ontop\n- Architected an asynchronous event-driven email system using Apache Kafka.\n- Designed an auditing microservice to track third-party API calls.\n\n[2020-2022] Backend Software Engineer @ GFT Group\n- Developed cloud-native REST APIs using Java and Quarkus for the oil industry.\n\n[2018-2020] Software Engineer @ Mastercard\n- Engineered fallback strategies and circuit breaker patterns for global payment infrastructure.",
                education: "MBA in Full Cycle Architecture - Full Cycle University (Graduation: Oct 2026)\nSystem Analysis and Development - Universidade Federal do Paraná (UFPR) (Graduated: Aug 2017)",
                downloading: "Initiating resume download (Matheus_Teixeira_Senior_Backend_Engineer.pdf)...",
                themeSuccess: "Theme updated to: ",
                invalid: "Command not found. Type 'help' for available commands.",
                langSwitch: "Language switched to English."
            },
            pt: {
                welcome: "Último login: " + new Date().toDateString() + "\nDigite 'help' para ver os comandos disponíveis.",
                help: "Comandos disponíveis:\n  whoami      - Ver resumo profissional\n  skills      - Ver stack tecnológica\n  experience  - Ver histórico profissional\n  education   - Ver formação acadêmica\n  download    - Baixar currículo em formato PDF\n  theme       - Mudar tema do terminal (default, dracula, ubuntu, light)\n  lang pt     - Mudar para Português\n  lang en     - Mudar para Inglês\n  clear       - Limpar o terminal",
                whoami: "Matheus Batista Teixeira\nEngenheiro de Software Backend Sênior com 9 anos de experiência em sistemas distribuídos e arquiteturas corporativas de alta escala.\nEspecialista no ecossistema Java/Spring, arquitetura orientada a eventos (Kafka) e microsserviços.",
                skills: "Linguagens: Java, Python, SQL\nFrameworks: Spring Boot (Webflux, Data, Cloud, Batch), Quarkus, JUnit, MyBatis\nBancos de Dados: PostgreSQL, MongoDB, Redis, Firebase, Oracle Database\nCloud/Devops: Docker, Google Cloud Platform (GCP), Splunk\nArquitetura: Apache Kafka, Microsserviços, APIs REST, GraphQL",
                experience: "[2023-Presente] Engenheiro de Software Sênior @ Abercrombie & Fitch\n- Reduziu a latência de recuperação de dados de inventário em 99,9% refatorando consultas SQL.\n- Arquitetou pipelines automatizados de alto volume para processamento de dados usando Spring Batch.\n\n[2022-2023] Engenheiro de Software Backend Sênior @ Ontop\n- Arquitetou um sistema de email assíncrono orientado a eventos usando Apache Kafka.\n- Projetou um microsserviço de auditoria para rastrear chamadas de API de terceiros.\n\n[2020-2022] Engenheiro de Software Backend @ GFT Group\n- Desenvolveu APIs REST cloud-native usando Java e Quarkus para a indústria de petróleo.\n\n[2018-2020] Engenheiro de Software @ Mastercard\n- Desenvolveu estratégias de fallback e circuit breaker para infraestrutura de pagamentos globais.",
                education: "MBA em Full Cycle Architecture - Full Cycle University (Previsão: Out 2026)\nAnálise e Desenvolvimento de Sistemas - Universidade Federal do Paraná (UFPR) (Concluído: Ago 2017)",
                downloading: "Iniciando o download do currículo (Matheus_Teixeira_Senior_Backend_Engineer.pdf)...",
                themeSuccess: "Tema atualizado para: ",
                invalid: "Comando não encontrado. Digite 'help' para comandos disponíveis.",
                langSwitch: "Idioma alterado para Português."
            }
        };

        // Inicializa o Terminal
        printOutput(resumeData[currentLang].welcome);

        // Lidar com Entrada do Usuário e Histórico (Setas)
        commandInput.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') {
                const cmd = this.value.trim().toLowerCase();
                
                if (cmd) {
                    commandHistory.push(cmd);
                    historyIndex = commandHistory.length;
                }
                
                this.value = '';
                processCommand(cmd);
            } 
            else if (e.key === 'ArrowUp') {
                e.preventDefault(); // Evita que o cursor vá pro início
                if (historyIndex > 0) {
                    historyIndex--;
                    this.value = commandHistory[historyIndex];
                }
            } 
            else if (e.key === 'ArrowDown') {
                e.preventDefault();
                if (historyIndex < commandHistory.length - 1) {
                    historyIndex++;
                    this.value = commandHistory[historyIndex];
                } else {
                    historyIndex = commandHistory.length;
                    this.value = '';
                }
            }
        });

        // Foco automático
        document.addEventListener('click', (e) => {
            if (e.target.closest('.terminal-body')) {
                commandInput.focus();
            }
        });

        function processCommand(cmd) {
            printOutput(`<span style="color: var(--text-prompt)">matheus@portfolio:~$</span> ${cmd}`);

            if (cmd === '') return;

            // Lógica do comando Theme
            if (cmd.startsWith('theme')) {
                const parts = cmd.split(' ');
                if (parts.length > 1) {
                    const themeName = parts[1];
                    const validThemes = ['default', 'dracula', 'ubuntu', 'light'];
                    
                    if (validThemes.includes(themeName)) {
                        terminalWindow.className = 'terminal-window'; // Reseta classes
                        if (themeName !== 'default') {
                            terminalWindow.classList.add(`theme-${themeName}`);
                        }
                        printOutput(resumeData[currentLang].themeSuccess + themeName);
                    } else {
                        printOutput("Invalid theme. Available: default, dracula, ubuntu, light");
                    }
                } else {
                    printOutput("Usage: theme <name>\nAvailable: default, dracula, ubuntu, light");
                }
                return;
            }

            switch (cmd) {
                case 'help':
                    printOutput(resumeData[currentLang].help);
                    break;
                case 'whoami':
                    printOutput(resumeData[currentLang].whoami);
                    break;
                case 'skills':
                    printOutput(resumeData[currentLang].skills);
                    break;
                case 'experience':
                    printOutput(resumeData[currentLang].experience);
                    break;
                case 'education':
                    printOutput(resumeData[currentLang].education);
                    break;
                case 'download':
                    printOutput(resumeData[currentLang].downloading);
                    triggerDownload();
                    break;
                case 'clear':
                    outputDiv.innerHTML = '';
                    break;
                case 'lang pt':
                    currentLang = 'pt';
                    printOutput(resumeData[currentLang].langSwitch);
                    break;
                case 'lang en':
                    currentLang = 'en';
                    printOutput(resumeData[currentLang].langSwitch);
                    break;
                default:
                    printOutput(resumeData[currentLang].invalid);
            }
        }

        function triggerDownload() {
            const link = document.createElement('a');
            link.href = 'Matheus_Teixeira_Senior_Backend_Engineer.pdf'; 
            link.download = 'Matheus_Teixeira_Senior_Backend_Engineer.pdf';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function printOutput(text) {
            const div = document.createElement('div');
            div.className = 'output-line';
            div.innerHTML = text; 
            outputDiv.appendChild(div);
            outputContainer.scrollTop = outputContainer.scrollHeight;
        }
    </script>
</body>
</html>
